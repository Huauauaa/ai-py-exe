name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_path: dist/time-tool.exe
            artifact_name: time-tool-windows.exe
            dmg_name: ""
          - os: ubuntu-latest
            artifact_path: dist/time-tool
            artifact_name: time-tool-Linux-x64
            dmg_name: ""
          - os: macos-13
            artifact_path: dist/time-tool
            artifact_name: time-tool-macOS-x64
            dmg_name: time-tool-macOS-x64.dmg
          - os: macos-14
            artifact_path: dist/time-tool
            artifact_name: time-tool-macOS-arm64
            dmg_name: time-tool-macOS-arm64.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile --name time-tool time_tool.py

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item ${{ matrix.artifact_path }} release/${{ matrix.artifact_name }}

      - name: Prepare artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp ${{ matrix.artifact_path }} release/${{ matrix.artifact_name }}

      - name: Build DMG package (macOS)
        if: runner.os == 'macOS'
        run: |
          rm -rf dmg-root
          mkdir -p dmg-root
          cp ${{ matrix.artifact_path }} dmg-root/time-tool
          chmod +x dmg-root/time-tool
          hdiutil create \
            -volname "time-tool" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            release/${{ matrix.dmg_name }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
